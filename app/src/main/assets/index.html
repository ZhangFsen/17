nt-size:11px;font-variant-numeric:tabular-nums}.modal-actions{display:flex;gap:10px;margin-top:14px}.btn{height:42px;padding:0 15px;border-radius:14px;background:#f4eee7;font-weight:800}.btn.primary{background:var(--primary);color:#fff}.btn.danger{background:#fff0ee;color:var(--danger)}.btn.flex{flex:1}.field{margin:10px 0}.field label{display:block;font-size:12px;color:#888;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 12px;outline:none}.cat-manage-row{display:grid;grid-template-columns:38px 1fr auto auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #f3eee8}.cat-manage-row:last-child{border-bottom:0}.small{font-size:12px;padding:7px 10px;border-radius:10px;background:#f5eee7;color:#555}.text-box{width:100%;min-height:180px;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;outline:none;font-family:ui-monospace,Menlo,monospace;font-size:12px}.splash{position:fixed;inset:0;background:linear-gradient(135deg,#ff7a00,#ffa645);display:grid;place-items:center;z-index:300;color:#fff;transition:.35s}.splash.hide{opacity:0;pointer-events:none}.splash-logo{text-align:center}.splash-logo .mark{width:72px;height:72px;border-radius:24px;background:rgba(255,255,255,.22);display:grid;place-items:center;margin:0 auto 14px;font-size:38px}.splash-logo b{font-size:28px}.splash-logo p{margin:8px 0 0;opacity:.84}.file-hidden{display:none}.native-date{position:absolute;opacity:0;pointer-events:none}.switch{width:48px;height:28px;border-radius:999px;background:#ddd;position:relative;transition:.2s}.switch:after{content:"";position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;left:2px;top:2px;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.16)}.switch.on{background:var(--primary)}.switch.on:after{left:22px}.cal-blank{width:18px;height:18px;border:2px solid currentColor;border-radius:5px;display:inline-block;position:relat /* v5.8 polish */
.logo-title{display:flex;align-items:center;gap:7px}

.chart-range{display:flex;align-items:center;justify-content:space-between;margin-top:12px}

.bars.clean .bar-label{display:none}

.pie-wrap{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:center;min-height:170px}

.bill-table-compact th,.bill-table-compact td{width:25%}.bill-table-compact td:first-child small{display:block;margin-top:3px;color:#aaa;font-size:10px;font-weight:500}.time-picker{position:relative;align-items:center}.time-picker:before{content:"";position:absolute;left:0;right:0;top:50%;height:38px;transform:translateY(-50%);border-top:1px solid #ffd9b7;border-bottom:1px solid #ffd9b7;background:rgba(255,122,0,.045);border-radius:13px;pointer-events:none;z-index:1}.time-picker:after{content:":";position:absolute;left:50%;top:50%;transform:translate(-50%,-53%);font-size:24px;font-weight:900;color:var(--primary);z-index:2;pointer-events:none}.time-wheel{scroll-snap-type:y mandatory;scroll-behavior:smooth;overscroll-behavior:contain;padding:58px 6px!important;position:relative;z-index:2;background:transparent!important}.time-item{scroll-snap-align:center;background:transparent!important;border-radius:10px;transition:.15s;color:#aaa}.time-item.on{background:transparent!important;color:var(--primary)!important;font-size:20px!important;transform:scale(1.06)}.time-item.near{color:#777}.time-labels{display:grid;grid-template-columns:1fr 1fr;text-align:center;color:#aaa;font-size:12px;margin-top:2px}</style>

<body>
<div class="splash" id="splash"><div class="splash-logo"><div class="mark">⚡</div><b>秒记账</b><p>快速记账，清晰每一笔</p></div></div>
<div id="app">
  <section id="home" class="page active"></section>
  <section id="chart" class="page"></section>
  <section id="bill" class="page"></section>
  <section id="mine" class="page"></section>
</div>
<nav class="nav">
  <button data-go="home" class="on"><span class="ico">📋</span>明细</button>
  <button data-go="chart"><span class="ico">📊</span>图表</button>
  <button class="plus" onclick="openAdd()">＋</button>
  <button data-go="bill"><span class="ico">🧾</span>账单</button>
  <button data-go="mine"><span class="ico">👤</span>我的</button>
</nav>

<div class="sheet" id="addSheet" onclick="maskClose(event,'addSheet')"><div class="sheet-box">
  <div class="sheet-head"><div class="seg"><button id="expenseBtn" onclick="setAddType('expense')">支出</button><button id="incomeBtn" onclick="setAddType('income')">收入</button></div><button class="close" onclick="closeAdd()">×</button></div>
  <div id="catGrid" class="cat-grid"></div>
  <div class="amount-box"><div class="sub">金额（元）</div><div class="amount-display" id="amountDisplay">¥0.00</div></div>
  <input class="note-input" id="noteInput" placeholder="添加备注（可选）" />
  <input class="native-date" id="entryDateInput" type="date" onchange="onDatePicked(this.value)" />
  <div class="keypad" id="keypad"></div>
</div></div>

<div class="panel" id="monthPanel" onclick="maskClose(event,'monthPanel')"><div class="panel-box"><div class="sheet-head"><b id="monthPanelTitle">选择月份</b><button class="close" onclick="closePanel('monthPanel')">×</button></div><div class="modal-actions"><button class="btn" onclick="changeMonthYear(-1)">上一年</button><button class="btn flex" id="monthYearBtn"></button><button class="btn" onclick="changeMonthYear(1)">下一年</button></div><div class="month-grid" id="monthGrid" style="margin-top:12px"></div></div></div>
<div class="panel" id="catPanel" onclick="maskClose(event,'catPanel')"><div class="panel-box"><div class="sheet-head"><b>分类管理</b><button class="close" onclick="closePanel('catPanel')">×</button></div><div class="seg" style="width:max-content;margin-bottom:10px"><button id="catManageExpense" onclick="setManageType('expense')">支出</button><button id="catManageIncome" onclick="setManageType('income')">收入</button></div><div id="catManageList"></div><button class="btn primary" style="width:100%;margin-top:12px" onclick="addManagedCat()">新增分类</button></div></div>
<div class="panel" id="budgetPanel" onclick="maskClose(event,'budgetPanel')"><div class="panel-box"><div class="sheet-head"><b>预算设置</b><button class="close" onclick="closePanel('budgetPanel')">×</button></div><div class="field"><label>本月支出预算</label><input id="budgetInput" type="number" inputmode="decimal" /></div><button class="btn primary" style="width:100%" onclick="saveBudget()">保存预算</button></div></div>
<div class="panel" id="reminderPanel" onclick="maskClose(event,'reminderPanel')"><div class="panel-box"><div class="sheet-head"><b>提醒设置</b><button class="close" onclick="closePanel('reminderPanel')">×</button></div><div class="setting"><div><b>每日记账提醒</b><div class="sub">到点提醒你记录当天消费</div></div><button id="reminderSwitch" class="switch" onclick="toggleReminderSwitch()"></button></div><div class="time-display" id="reminderTimeDisplay">21:00</div><div class="time-labels"><span>小时</span><span>分钟</span></div><div class="time-picker"><div class="time-wheel" id="hourWheel"></div><div class="time-wheel" id="minuteWheel"></div></div><button class="btn primary" style="width:100%" onclick="saveReminder()">保存提醒</button></div></div>
<div class="panel" id="yearPanel" onclick="maskClose(event,'yearPanel')"><div class="panel-box"><div class="sheet-head"><b>选择年份</b><button class="close" onclick="closePanel('yearPanel')">×</button></div><div class="year-wheel" id="yearWheel"></div><button class="btn primary" style="width:100%;margin-top:12px" onclick="closePanel('yearPanel');renderBill()">确定</button></div></div>
<div class="panel" id="textPanel" onclick="maskClose(event,'textPanel')"><div class="panel-box"><div class="sheet-head"><b id="textTitle">备份数据</b><button class="close" onclick="closePanel('textPanel')">×</button></div><textarea id="textBox" class="text-box"></textarea><input id="restoreFile" class="file-hidden" type="file" accept="application/json,.json" onchange="handleRestoreFile(event)"/><div class="modal-actions" id="backupActions"><button class="btn flex" onclick="copyText()">复制</button><button class="btn primary flex" onclick="exportFile()">导出文件</button></div><div class="modal-actions" id="restoreActions" style="display:none"><button class="btn flex" onclick="chooseRestoreFile()">导入JSON</button><button class="btn flex" onclick="restoreBackup('merge')">合并恢复</button><button class="btn danger flex" onclick="restoreBackup('replace')">替换恢复</button></div><div class="sub" id="exportPath" style="display:none;margin-top:10px"></div></div></div>
<div class="panel" id="aboutPanel" onclick="maskClose(event,'aboutPanel')"><div class="panel-box"><div class="sheet-head"><b>关于秒记账</b><button class="close" onclick="closePanel('aboutPanel')">×</button></div><div class="card"><b style="font-size:20px">秒记账</b><p class="sub" style="line-height:1.9">版本号：v5.9<br>作者：ZhangFsen<br>QQ：1292598229<br><br>本应用为本地记账工具，数据默认保存在手机本地，请定期备份。</p></div></div></div>
<input id="avatarInput" class="file-hidden" type="file" accept="image/*" onchange="handleAvatarFile(event)" />
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);const todayStr=()=>new Date().toISOString().slice(0,10);const LS={entries:'mjz_entries',cats:'mjz_cats',incomeCats:'mjz_income_cats',budget:'mjz_budget',nick:'mjz_nick',avatar:'mjz_avatar',reminder:'mjz_reminder'};function readJSON(k,f){try{let v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}function readNum(k,f){let n=parseFloat(localStorage.getItem(k));return isNaN(n)?f:n}
let entries=readJSON(LS.entries,[]),cats=readJSON(LS.cats,null)||[['餐饮','🍜'],['出行','🚌'],['购物','🛍️'],['日用','🧻'],['娱乐','🎮'],['医疗','✚'],['教育','🎓'],['其他','…']],incomeCats=readJSON(LS.incomeCats,null)||[['工资','💴'],['兼职','🕘'],['理财','📈'],['礼金','💌'],['其他','💰']],budget=readNum(LS.budget,3000),nick=localStorage[LS.nick]||'记账用户',avatar=localStorage[LS.avatar]||'🙂',reminder=readJSON(LS.reminder,{enabled:false,time:'21:00'});
let currentPage='home',selectedDate=localStorage.mjz_selectedDate||todayStr().slice(0,7)+'-01',addType='expense',addCat=cats[0],addAmount='',addDate=todayStr(),editingIndex=null,pendingIndex=null,statPeriod=localStorage.mjz_stat_period||'month',statMetric=localStorage.mjz_stat_metric||'expense',chartType=localStorage.mjz_chart_type||'bar',chartTipIndex=-1,billMode=(localStorage.mjz_bill_mode==='day'?'week':(localStorage.mjz_bill_mode||'month')),manageType='expense',reminderHour='21',reminderMinute='00',monthCursor=new Date(selectedDate);
let lastHaptic=0;function haptic(ms=45){try{let n=Date.now();if(n-lastHaptic<35)return;lastHaptic=n;if(window.AndroidBridge&&AndroidBridge.vibrate)AndroidBridge.vibrate(ms);else if(navigator.vibrate)navigator.vibrate(ms)}catch(e){}}document.addEventListener('click',e=>{if(e.target.closest('button,.row,.setting,.cat,.month-cell'))haptic(45)},true);setTimeout(()=>{$('splash').classList.add('hide')},900);
function saveAll(){localStorage[LS.entries]=JSON.stringify(entries);localStorage[LS.cats]=JSON.stringify(cats);localStorage[LS.incomeCats]=JSON.stringify(incomeCats);localStorage[LS.budget]=budget;localStorage[LS.nick]=nick;localStorage[LS.avatar]=avatar;localStorage[LS.reminder]=JSON.stringify(reminder);localStorage.mjz_selectedDate=selectedDate;localStorage.mjz_stat_period=statPeriod;localStorage.mjz_stat_metric=statMetric;localStorage.mjz_chart_type=chartType;localStorage.mjz_bill_mode=billMode}function money(v){let s=Math.abs(Number(v)||0).toFixed(2);return (v<0?'-':'')+'¥'+s}function yuan(v){return '¥'+(Number(v)||0).toFixed(2)}function plain(v){return (Number(v)||0).toFixed(2)}function ym(){return selectedDate.slice(0,7)}function monthTitle(ds=selectedDate){let [y,m]=ds.slice(0,7).split('-');return `${y}年${parseInt(m)}月`}function isMonth(e,m=ym()){return e.date&&e.date.startsWith(m)}function exp(list){return list.filter(e=>e.amount<0).reduce((a,e)=>a+Math.abs(e.amount),0)}function inc(list){return list.filter(e=>e.amount>0).reduce((a,e)=>a+Math.abs(e.amount),0)}function monthEntries(m=ym()){return entries.filter(e=>isMonth(e,m))}function toast(t){let el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>el.classList.remove('show'),1600)}function maskClose(e,id){if(e.target.id===id)closePanel(id)}function closePanel(id){$(id).classList.remove('show')}function go(p){currentPage=p;document.querySelectorAll('.page').forEach(x=>x.classList.toggle('active',x.id===p));document.querySelectorAll('.nav [data-go]').forEach(b=>b.classList.toggle('on',b.dataset.go===p));render()}document.querySelectorAll('.nav [data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));window.appBack=()=>{let open=[...document.querySelectorAll('.panel.show,.sheet.show')][0];if(open){open.classList.remove('show');return true}if(currentPage!=='home'){go('home');return true}return false};
function render(){if(currentPage==='home')renderHome();if(currentPage==='chart')renderChart();if(currentPage==='bill')renderBill();if(currentPage==='mine')renderMine();scheduleReminder()}function renderHome(){let list=monthEntries(),e=exp(list),i=inc(list);let recent=list.slice().sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,20);$('home').innerHTML=`<div class="top"><div><div class="logo-title"><span class="logo-mark">⚡</span><div class="title">秒记账</div></div><div class="sub">记录每一笔小账</div></div><button class="pill" onclick="openMonthPanel()">${monthTitle()} ▼</button></div><div class="card summary home-summary"><div class="label">本月支出</div><div class="big">${yuan(e)}</div><div class="summary-grid"><div><span class="label">收入</span><b>${yuan(i)}</b></div><div><span class="label">预算剩余</span><b>${money(budget-e)}</b></div><div><span class="label">笔数</span><b>${list.length}</b></div></div></div><div class="card"><div class="top" style="margin:0 0 4px"><b>最近账单</b><span class="sub">${list.length} 笔</span></div>${recent.length?recent.map(rowHtml).join(''):'<div class="empty">本月还没有记录，点中间 + 开始记账</div>'}</div>`}function rowHtml(r){let idx=entries.indexOf(r);let positive=r.amount>0;return `<div class="row" onclick="openRecordActions(${idx})"><div class="icon">${r.icon||'…'}</div><div class="row-main"><div class="row-title">${r.name||'其他'}</div><div class="row-note">${r.date||''} ${r.time||''}${r.note?' · '+r.note:''}</div></div><div class="money ${positive?'inc':'exp'}">${positive?'+':''}${money(r.amount)}</div></div>`}
function openMonthPanel(){monthCursor=new Date(selectedDate);$('monthPanel').classList.add('show');renderMonthPanel()}function changeMonthYear(n){monthCursor.setFullYear(monthCursor.getFullYear()+n);renderMonthPanel()}function renderMonthPanel(){let y=monthCursor.getFullYear();$('monthYearBtn').textContent=y+'年';let html='';for(let m=1;m<=12;m++){let key=y+'-'+String(m).padStart(2,'0'),total=exp(monthEntries(key));let on=ym()===key;html+=`<button class="month-cell ${on?'on':''}" onclick="selectMonth('${key}')"><b>${m}月</b><small>${yuan(total)}</small></button>`}$('monthGrid').innerHTML=html}function selectMonth(key){selectedDate=key+'-01';saveAll();closePanel('monthPanel');render()}
function openRecordActions(i){pendingIndex=i;let e=entries[i];if(!e)return;if(confirm(`${e.name} ${money(e.amount)}\n\n确定：编辑\n取消：关闭`)){editRecord(i)}}function editRecord(i){let e=entries[i];editingIndex=i;addType=e.amount<0?'expense':'income';addCat=[e.name,e.icon];addAmount=String(Math.abs(e.amount));addDate=e.date||todayStr();$('noteInput').value=e.note||'';openAdd(true)}function deleteRecord(i){if(confirm('确认删除这条记录？')){entries.splice(i,1);saveAll();render();toast('已删除')}}
function openAdd(edit=false){if(!edit){editingIndex=null;addType='expense';addCat=cats[0];addAmount='';addDate=todayStr();$('noteInput').value=''}$('addSheet').classList.add('show');setAddType(addType);renderAmount();renderKeypad()}function closeAdd(){$('addSheet').classList.remove('show')}function currentCats(){return addType==='expense'?cats:incomeCats}function setAddType(t){addType=t;$('expenseBtn').classList.toggle('on',t==='expense');$('incomeBtn').classList.toggle('on',t==='income');let list=currentCats();if(!list.some(c=>c[0]===addCat[0]&&c[1]===addCat[1]))addCat=list[0];renderCats()}function renderCats(){let list=currentCats();$('catGrid').innerHTML=list.map(c=>`<button class="cat ${c[0]===addCat[0]?'on':''}" onclick='pickCat(${JSON.stringify(c)})'><span>${c[1]}</span><small>${c[0]}</small></button>`).join('')}function pickCat(c){addCat=c;renderCats()}function renderAmount(){let v=parseFloat(addAmount||'0')||0;$('amountDisplay').textContent='¥'+v.toFixed(2);$('entryDateInput').value=addDate}function keyNum(ch){if(ch==='.'&&addAmount.includes('.'))return;if(ch==='.'&&!addAmount)addAmount='0';if(addAmount==='0'&&ch!=='.')addAmount='';let v=addAmount+ch;if(/^\d{0,8}(\.\d{0,2})?$/.test(v)){addAmount=v;renderAmount()}}function backspace(){addAmount=addAmount.slice(0,-1);renderAmount()}function clearAmount(){addAmount='';renderAmount()}function renderKeypad(){let dateLabel=addDate===todayStr()?'今天':'日期';$('keypad').innerHTML=`<button onclick="keyNum('1')">1</button><button onclick="keyNum('2')">2</button><button onclick="keyNum('3')">3</button><button class="date-key" onclick="pickDate()"><span class="cal-blank"></span>${dateLabel}</button><button onclick="keyNum('4')">4</button><button onclick="keyNum('5')">5</button><button onclick="keyNum('6')">6</button><button class="save-key" onclick="saveEntry()">完成</button><button onclick="keyNum('7')">7</button><button onclick="keyNum('8')">8</button><button onclick="keyNum('9')">9</button><button class="soft-key" onclick="clearAmount()">清空</button><button onclick="keyNum('0')">0</button><button onclick="keyNum('.')">.</button><button class="soft-key" onclick="backspace()">⌫</button>`}function pickDate(){$('entryDateInput').value=addDate;$('entryDateInput').showPicker?$('entryDateInput').showPicker():$('entryDateInput').click()}function onDatePicked(v){if(v){addDate=v;renderKeypad()}}function saveEntry(){let v=parseFloat(addAmount||'0');if(!v){toast('请输入金额');return}let d=new Date(),time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');let data={name:addCat[0],icon:addCat[1],amount:addType==='expense'?-Math.abs(v):Math.abs(v),date:addDate,time,note:$('noteInput').value.trim()};if(editingIndex!==null)entries[editingIndex]=data;else entries.unshift(data);selectedDate=addDate.slice(0,7)+'-01';saveAll();closeAdd();render();haptic(90);toast(editingIndex!==null?'已修改':'已保存')}
function dateObj(ds){return new Date(ds+'T00:00:00')}
function statRangeInfo(){let base=dateObj(selectedDate),start,end,title;if(statPeriod==='week'){let day=base.getDay()||7;start=new Date(base);start.setDate(base.getDate()-day+1);end=new Date(start);end.setDate(start.getDate()+7);title=`${String(start.getMonth()+1).padStart(2,'0')}/${String(start.getDate()).padStart(2,'0')}-${String(new Date(end-86400000).getMonth()+1).padStart(2,'0')}/${String(new Date(end-86400000).getDate()).padStart(2,'0')}`}else if(statPeriod==='year'){start=new Date(base.getFullYear(),0,1);end=new Date(base.getFullYear()+1,0,1);title=`${base.getFullYear()}年`}else{start=new Date(base.getFullYear(),base.getMonth(),1);end=new Date(base.getFullYear(),base.getMonth()+1,1);title=monthTitle(selectedDate)}return{start,end,title}}
function rangeEntries(){let r=statRangeInfo();return entries.filter(e=>{if(!e.date)return false;let x=dateObj(e.date);return x>=r.start&&x<r.end})}
function metricValue(e){return statMetric==='expense'?Math.max(0,-e.amount):Math.max(0,e.amount)}
function changeStatRange(n){let d=dateObj(selectedDate);if(statPeriod==='week')d.setDate(d.getDate()+n*7);else if(statPeriod==='year')d.setFullYear(d.getFullYear()+n);else d.setMonth(d.getMonth()+n);selectedDate=d.toISOString().slice(0,10);chartTipIndex=-1;saveAll();render()}
function renderChart(){let list=rangeEntries(),total=list.reduce((a,e)=>a+metricValue(e),0),avg=list.length?total/list.length:0;let income=inc(list),expense=exp(list);let range=statRangeInfo();$('chart').innerHTML=`<div class="top"><div><div class="title">图表</div><div class="sub">看懂钱花在哪</div></div><div class="seg"><button class="${statMetric==='expense'?'on':''}" onclick="setMetric('expense')">支出</button><button class="${statMetric==='income'?'on':''}" onclick="setMetric('income')">收入</button></div></div><div class="card"><div class="seg" style="width:100%;display:grid;grid-template-columns:repeat(3,1fr)"><button class="${statPeriod==='week'?'on':''}" onclick="setPeriod('week')">周</button><button class="${statPeriod==='month'?'on':''}" onclick="setPeriod('month')">月</button><button class="${statPeriod==='year'?'on':''}" onclick="setPeriod('year')">年</button></div><div class="chart-range"><button onclick="changeStatRange(-1)">‹</button><b>${range.title}</b><button onclick="changeStatRange(1)">›</button></div><div style="display:flex;justify-content:space-between;align-items:end;margin-top:12px"><div><div class="sub">${statMetric==='expense'?'总支出':'总收入'}</div><div style="font-size:30px;font-weight:900">${yuan(total)}</div></div><div class="sub" style="text-align:right">收入 ${yuan(income)}<br>支出 ${yuan(expense)}<br>平均 ${yuan(avg)}</div></div></div><div class="card chart-card"><div class="chart-tools"><b>趋势</b><div class="seg"><button class="${chartType==='bar'?'on':''}" onclick="setChartType('bar')">柱状</button><button class="${chartType==='line'?'on':''}" onclick="setChartType('line')">折线</button><button class="${chartType==='pie'?'on':''}" onclick="setChartType('pie')">饼图</button></div></div>${chartHtml(list)}</div><div class="card"><b>AI 消费分析</b><div class="analysis">${analysisText(list)}</div></div><div class="card"><b>分类排行</b>${rankHtml(list)}</div>`}
function setMetric(m){statMetric=m;chartTipIndex=-1;saveAll();renderChart()}function setPeriod(p){statPeriod=p;chartTipIndex=-1;saveAll();renderChart()}function setChartType(t){chartType=t;chartTipIndex=-1;saveAll();renderChart()}function setChartTip(i){chartTipIndex=i;renderChart()}
function chartSeries(list){let map={},labels=[];let base=dateObj(selectedDate);if(statPeriod==='year'){for(let i=1;i<=12;i++){let k=String(i)+'月';map[k]=0;labels.push(k)}list.forEach(e=>{let k=parseInt(e.date.slice(5,7))+'月';map[k]=(map[k]||0)+metricValue(e)})}else if(statPeriod==='month'){let days=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();for(let i=1;i<=days;i++){let k=String(i);map[k]=0;labels.push(k)}list.forEach(e=>{let k=String(parseInt(e.date.slice(8,10)));map[k]=(map[k]||0)+metricValue(e)})}else{let r=statRangeInfo();for(let d=new Date(r.start);d<r.end;d.setDate(d.getDate()+1)){let k=String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');map[k]=0;labels.push(k)}list.forEach(e=>{let d=dateObj(e.date),k=String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');map[k]=(map[k]||0)+metricValue(e)})}return labels.map(k=>[k,map[k]||0])}
function chartHtml(list){if(chartType==='line')return chartLine(list);if(chartType==='pie')return chartPie(list);return chartBars(list)}
function chartBars(list){let s=chartSeries(list);if(!s.length)return '<div class="empty">暂无数据</div>';let max=Math.max(...s.map(x=>x[1]),1);let tip=s[chartTipIndex];let bars=s.map(([k,v],idx)=>{let h=v===0?0:Math.max(4,Math.round(v/max*100));return `<div class="bar-wrap" onclick="setChartTip(${idx})"><div class="bar ${v===0?'zero':''}" style="height:${h}%;--h:${h}%"></div></div>`}).join('');let step=Math.max(1,Math.ceil(s.length/7));let labs=s.map(([k],idx)=>`<span>${s.length<=12||idx%step===0?k:''}</span>`).join('');return `<div class="bars clean">${tip?`<div class="chart-tip">${tip[0]}　${yuan(tip[1])}</div>`:''}${bars}</div><div class="xlabels">${labs}</div>`}
function chartLine(list){let s=chartSeries(list);if(!s.length)return '<div class="empty">暂无数据</div>';let max=Math.max(...s.map(x=>x[1]),1),w=320,h=130,pad=16;let pts=s.map((x,i)=>{let px=s.length===1?w/2:pad+i*(w-pad*2)/(s.length-1);let py=h-pad-(x[1]/max)*(h-pad*2);return [px,py,x[0],x[1]]});let path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');let step=Math.max(1,Math.ceil(s.length/6));let tip=pts[chartTipIndex];return `<div class="line-chart">${tip?`<div class="chart-tip">${tip[2]}　${yuan(tip[3])}</div>`:''}<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="M${pad} ${h-pad} H${w-pad}" stroke="#eee" fill="none"/><path d="${path}" stroke="var(--primary)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>${pts.map((p,i)=>`<circle class="line-point" onclick="setChartTip(${i})" cx="${p[0]}" cy="${p[1]}" r="${i===chartTipIndex?5:3.5}" fill="${p[3]?'var(--primary)':'#fff'}" stroke="var(--primary)" stroke-width="2"/>`).join('')}${pts.map((p,i)=>i%step===0?`<text x="${p[0]}" y="${h-1}" text-anchor="middle">${p[2]}</text>`:'').join('')}</svg></div>`}
function chartPie(list){let map={};list.forEach(e=>{let v=metricValue(e);if(v)map[(e.icon||'')+' '+(e.name||'其他')]=(map[(e.icon||'')+' '+(e.name||'其他')]||0)+v});let arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);if(!arr.length)return '<div class="empty">暂无占比数据</div>';let total=arr.reduce((a,b)=>a+b[1],0),colors=['#ff7a00','#ffb066','#ffd4ab','#ffe8d4','#e8d7c7'];let cur=0,stops=[];arr.slice(0,5).forEach((x,i)=>{let a=cur,b=cur+x[1]/total*100;stops.push(`${colors[i]} ${a}% ${b}%`);cur=b});if(cur<100)stops.push(`#f2ede8 ${cur}% 100%`);return `<div class="pie-wrap"><div class="pie" style="background:conic-gradient(${stops.join(',')})"></div><div class="pie-list">${arr.slice(0,5).map((x,i)=>`<div class="pie-item"><span><i class="pie-dot" style="background:${colors[i]}"></i>${x[0]}</span><b>${Math.round(x[1]/total*100)}%</b></div>`).join('')}</div></div>`}
function rankHtml(list){let map={};list.forEach(e=>{let val=metricValue(e);if(val){let k=(e.icon||'')+' '+(e.name||'其他');map[k]=(map[k]||0)+val}});let arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);if(!arr.length)return '<div class="empty">暂无排行数据</div>';let max=arr[0][1];return arr.map((x,i)=>`<div class="rank-row"><b>${i+1}</b><div><b>${x[0]}</b><div class="progress"><i style="width:${Math.round(x[1]/max*100)}%"></i></div></div><div class="money">${yuan(x[1])}</div></div>`).join('')}function analysisText(list){let total=list.reduce((a,e)=>a+metricValue(e),0);if(!total)return '当前范围暂无数据。继续记录后，这里会自动生成消费小结。';let s=chartSeries(list).sort((a,b)=>b[1]-a[1])[0];let top={};list.forEach(e=>{let v=metricValue(e);if(v)top[e.name]=(top[e.name]||0)+v});let c=Object.entries(top).sort((a,b)=>b[1]-a[1])[0];let pct=c?Math.round(c[1]/total*100):0;return `本期${statMetric==='expense'?'支出':'收入'}合计 <b>${yuan(total)}</b>。${c?`主要集中在「${c[0]}」，占比约 ${pct}%。`:''}${s?`金额最高的时间是 ${s[0]}，为 ${yuan(s[1])}。`:''}${statMetric==='expense'?'建议关注高占比分类，适当控制非必要支出。':'收入结构越稳定，月度结余越好规划。'}`}
function billYear(){return selectedDate.slice(0,4)}function yearEntries(y=billYear()){return entries.filter(e=>e.date&&e.date.startsWith(String(y)))}function openYearPanel(){renderYearWheel();$('yearPanel').classList.add('show');setTimeout(()=>{let el=document.querySelector('#yearWheel .year-item.on');if(el)el.scrollIntoView({block:'center'})},50)}function renderYearWheel(){let y=Number(billYear()),html='';for(let i=y-8;i<=y+8;i++){html+=`<button class="year-item ${i===y?'on':''}" onclick="selectBillYear(${i})">${i}年</button>`}$('yearWheel').innerHTML=html}function selectBillYear(y){selectedDate=String(y)+'-'+selectedDate.slice(5,7)+'-01';saveAll();renderYearWheel();renderBill()}function renderBill(){let y=billYear(),summaryList=yearEntries(y);let e=exp(summaryList),i=inc(summaryList);$('bill').innerHTML=`<div class="top"><div><div class="title">账单</div><div class="sub">按年 / 月 / 周对照</div></div><button class="pill" onclick="openYearPanel()">${y}年 ▼</button></div><div class="card summary"><div class="label">${y}年结余</div><div class="big">${money(i-e)}</div><div class="summary-grid"><div><span class="label">收入</span><b>${yuan(i)}</b></div><div><span class="label">支出</span><b>${yuan(e)}</b></div><div><span class="label">笔数</span><b>${summaryList.length}</b></div></div></div><div class="card"><div class="seg" style="width:max-content;margin-bottom:8px"><button class="${billMode==='year'?'on':''}" onclick="setBillMode('year')">年账单</button><button class="${billMode==='month'?'on':''}" onclick="setBillMode('month')">月账单</button><button class="${billMode==='week'?'on':''}" onclick="setBillMode('week')">周账单</button></div>${billTable()}</div>`}function setBillMode(m){billMode=m;saveAll();renderBill()}function weekNo(dateStr){let d=new Date(dateStr+'T00:00:00');let start=new Date(d.getFullYear(),0,1);let diff=Math.floor((d-start)/86400000);return Math.floor((diff+start.getDay())/7)+1}function billTable(){let rows=[],y=billYear();if(billMode==='year'){let l=yearEntries(y);if(l.length)rows=[[y+'年',l]]}else if(billMode==='month'){for(let m=1;m<=12;m++){let key=y+'-'+String(m).padStart(2,'0');let l=monthEntries(key);if(l.length)rows.push([m+'月',l])}}else{let groups={};yearEntries(y).forEach(e=>{let w=weekNo(e.date);(groups[w]||(groups[w]=[])).push(e)});rows=Object.keys(groups).map(Number).sort((a,b)=>a-b).map(w=>['第'+w+'周',groups[w]])}if(!rows.length)return '<div class="empty">暂无账单</div>';return `<table class="bill-table bill-table-compact"><thead><tr><th>日期</th><th>收入</th><th>支出</th><th>结余</th></tr></thead><tbody>${rows.map(([name,l])=>{let i=inc(l),e=exp(l);return `<tr><td>${name}<small>共 ${l.length} 笔</small></td><td>${plain(i)}</td><td>${plain(e)}</td><td>${plain(i-e)}</td></tr>`}).join('')}</tbody></table>`}function renderMine(){let av=avatar.startsWith('data:image')?`style="background-image:url(${avatar})"`:'';$('mine').innerHTML=`<div class="top"><div><div class="title">我的</div><div class="sub">本地数据与设置</div></div></div><div class="card profile"><div class="avatar" ${av} onclick="editAvatar()">${avatar.startsWith('data:image')?'':avatar}</div><div><b style="font-size:18px">${nick}</b><div class="sub">点击头像更换 · 本地个人信息</div></div><button class="btn" style="margin-left:auto" onclick="editNick()">编辑</button></div><div class="card"><b>数据管理</b>${setting('💾','备份数据','复制 JSON 备份','backup()')}${setting('📥','恢复数据','支持合并恢复 / 替换恢复','restorePrompt()')}${setting('🧹','清空数据','清空所有账单记录','clearData()',true)}</div><div class="card"><b>设置</b>${setting('🎯','预算设置','当前预算 '+yuan(budget),'openBudget()')}${setting('🏷️','分类管理','新增 / 编辑 / 删除分类','openCats()')}${setting('⏰','提醒设置',reminder.enabled?'每天 '+reminder.time:'未开启','openReminder()')}${setting('ℹ️','关于应用','版本与说明','openAbout()')}${setting('📝','意见反馈','保存到本地','feedback()')}</div>`}function setting(ic,t,d,fn,danger=false){return `<div class="setting" onclick="${fn}"><div class="setting-left"><div class="icon">${ic}</div><div><b style="${danger?'color:var(--danger)':''}">${t}</b><div class="sub">${d}</div></div></div><span class="sub">›</span></div>`}function editNick(){let n=prompt('修改昵称',nick);if(n&&n.trim()){nick=n.trim();saveAll();renderMine();toast('昵称已更新')}}function editAvatar(){$('avatarInput').value='';$('avatarInput').click()}function handleAvatarFile(ev){let f=ev.target.files&&ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{avatar=r.result;saveAll();renderMine();toast('头像已更新')};r.readAsDataURL(f)}function openBudget(){$('budgetInput').value=budget;$('budgetPanel').classList.add('show')}function saveBudget(){let v=parseFloat($('budgetInput').value);if(isNaN(v)||v<0){toast('请输入有效预算');return}budget=v;saveAll();closePanel('budgetPanel');render();toast('预算已保存')}function openCats(){manageType='expense';$('catPanel').classList.add('show');renderCatsList()}function setManageType(t){manageType=t;renderCatsList()}function manageList(){return manageType==='expense'?cats:incomeCats}function renderCatsList(){$('catManageExpense').classList.toggle('on',manageType==='expense');$('catManageIncome').classList.toggle('on',manageType==='income');let list=manageList();$('catManageList').innerHTML=list.map((c,i)=>`<div class="cat-manage-row"><span class="icon">${c[1]}</span><b>${c[0]}</b><button class="small" onclick="editManagedCat(${i})">编辑</button><button class="small" onclick="delManagedCat(${i})">删除</button></div>`).join('')}function addManagedCat(){let name=prompt('分类名称');if(!name)return;let icon=prompt('分类图标/emoji','📝')||'📝';manageList().push([name.trim(),icon.trim()||'📝']);saveAll();renderCatsList();render();toast('已添加')}function editManagedCat(i){let list=manageList(),c=list[i];let name=prompt('分类名称',c[0]);if(!name)return;let icon=prompt('分类图标/emoji',c[1])||c[1];list[i]=[name.trim(),icon.trim()||c[1]];saveAll();renderCatsList();render();toast('已修改')}function delManagedCat(i){let list=manageList();if(list.length<=1){toast('至少保留一个分类');return}if(confirm('删除这个分类？')){list.splice(i,1);saveAll();renderCatsList();render();toast('已删除')}}function openReminder(){let parts=(reminder.time||'21:00').split(':');reminderHour=parts[0]||'21';reminderMinute=parts[1]||'00';$('reminderSwitch').classList.toggle('on',!!reminder.enabled);renderTimeWheels();$('reminderPanel').classList.add('show');setTimeout(()=>{centerWheelValue('hourWheel',reminderHour);centerWheelValue('minuteWheel',reminderMinute);attachReminderWheel('hourWheel','hour');attachReminderWheel('minuteWheel','minute');updateReminderWheelState('hourWheel','hour');updateReminderWheelState('minuteWheel','minute')},80)}function renderTimeWheels(){if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;let hs='',ms='';for(let h=0;h<24;h++){let v=String(h).padStart(2,'0');hs+=`<button class="time-item ${v===reminderHour?'on':''}" data-value="${v}" onclick="setReminderHour('${v}')">${v}</button>`}for(let m=0;m<60;m++){let v=String(m).padStart(2,'0');ms+=`<button class="time-item ${v===reminderMinute?'on':''}" data-value="${v}" onclick="setReminderMinute('${v}')">${v}</button>`}$('hourWheel').innerHTML=hs;$('minuteWheel').innerHTML=ms}function centerWheelValue(id,value){let wheel=$(id);let el=wheel&&wheel.querySelector(`.time-item[data-value="${value}"]`);if(!wheel||!el)return;wheel.scrollTop=el.offsetTop-(wheel.clientHeight-el.offsetHeight)/2}function nearestWheelItem(wheel){let center=wheel.scrollTop+wheel.clientHeight/2;let items=[...wheel.querySelectorAll('.time-item')];let best=items[0],dist=Infinity;items.forEach(it=>{let c=it.offsetTop+it.offsetHeight/2,d=Math.abs(c-center);if(d<dist){dist=d;best=it}});return best}function updateReminderWheelState(id,type,doSnap=false){let wheel=$(id);if(!wheel)return;let item=nearestWheelItem(wheel);if(!item)return;let val=item.dataset.value;if(type==='hour')reminderHour=val;else reminderMinute=val;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;[...wheel.querySelectorAll('.time-item')].forEach(it=>{it.classList.toggle('on',it===item);let diff=Math.abs((it.offsetTop+it.offsetHeight/2)-(wheel.scrollTop+wheel.clientHeight/2));it.classList.toggle('near',diff<70&&it!==item)});if(doSnap){wheel.scrollTo({top:item.offsetTop-(wheel.clientHeight-item.offsetHeight)/2,behavior:'smooth'})}}function attachReminderWheel(id,type){let wheel=$(id);if(!wheel||wheel.dataset.snapReady)return;wheel.dataset.snapReady='1';let timer=null;wheel.addEventListener('scroll',()=>{updateReminderWheelState(id,type,false);clearTimeout(timer);timer=setTimeout(()=>updateReminderWheelState(id,type,true),120)},{passive:true})}function setReminderHour(v){reminderHour=v;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;centerWheelValue('hourWheel',v);setTimeout(()=>updateReminderWheelState('hourWheel','hour',true),80)}function setReminderMinute(v){reminderMinute=v;if($('reminderTimeDisplay'))$('reminderTimeDisplay').textContent=reminderHour+':'+reminderMinute;centerWheelValue('minuteWheel',v);setTimeout(()=>updateReminderWheelState('minuteWheel','minute',true),80)}function toggleReminderSwitch(){$('reminderSwitch').classList.toggle('on')}function saveReminder(){reminder={enabled:$('reminderSwitch').classList.contains('on'),time:reminderHour+':'+reminderMinute};saveAll();scheduleReminder();closePanel('reminderPanel');renderMine();toast(reminder.enabled?'提醒已开启':'提醒已关闭')}function scheduleReminder(){try{if(window.AndroidBridge){if(reminder.enabled&&AndroidBridge.scheduleDailyReminder)AndroidBridge.scheduleDailyReminder(reminder.time);if(!reminder.enabled&&AndroidBridge.cancelDailyReminder)AndroidBridge.cancelDailyReminder()}}catch(e){}}function openAbout(){$('aboutPanel').classList.add('show')}function feedback(){let v=prompt('请输入反馈内容');if(v){let arr=readJSON('mjz_feedback',[]);arr.push({time:new Date().toISOString(),text:v});localStorage.mjz_feedback=JSON.stringify(arr);if(window.AndroidBridge&&AndroidBridge.saveFeedback)AndroidBridge.saveFeedback(v);toast('感谢反馈，已保存')}}
function makeBackup(){return JSON.stringify({version:'5.9',exportedAt:new Date().toISOString(),entries,cats,incomeCats,budget,nick,avatar,reminder},null,2)}function backup(){$('textTitle').textContent='备份数据';$('textBox').value=makeBackup();$('backupActions').style.display='flex';$('restoreActions').style.display='none';$('exportPath').style.display='none';$('textPanel').classList.add('show')}function restorePrompt(){$('textTitle').textContent='恢复数据';$('textBox').value='';$('backupActions').style.display='none';$('restoreActions').style.display='flex';$('exportPath').style.display='none';$('textPanel').classList.add('show')}function copyText(){let v=$('textBox').value;navigator.clipboard&&navigator.clipboard.writeText(v);$('textBox').select();document.execCommand('copy');toast('已复制')}function exportFileDirect(){let data=makeBackup();let name='秒记账备份_'+todayStr()+'.json';if(window.AndroidBridge&&AndroidBridge.exportBackupFile){let p=AndroidBridge.exportBackupFile(name,data);toast(p?'已导出到下载目录':'导出失败');return}downloadText(name,data)}function exportFile(){let data=$('textBox').value||makeBackup();let name='秒记账备份_'+todayStr()+'.json';if(window.AndroidBridge&&AndroidBridge.exportBackupFile){let p=AndroidBridge.exportBackupFile(name,data);$('exportPath').textContent=p?'已导出：'+p:'导出失败';$('exportPath').style.display='block';toast(p?'已导出':'导出失败');return}downloadText(name,data)}function downloadText(name,data){let blob=new Blob([data],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}function chooseRestoreFile(){$('restoreFile').value='';$('restoreFile').click()}function handleRestoreFile(ev){let f=ev.target.files&&ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{$('textBox').value=r.result;toast('已读取文件，请选择恢复方式')};r.readAsText(f,'utf-8')}function normEntry(e){return{amount:Number(e.amount)||0,date:e.date||'',time:e.time||'',name:e.name||'其他',icon:e.icon||'…',note:e.note||''}}function ekey(e){let x=normEntry(e);return [x.date,x.time,x.amount,x.name,x.icon,x.note].join('|')}function restoreBackup(mode){let txt=$('textBox').value.trim();if(!txt){toast('请先粘贴或导入备份');return}try{let o=JSON.parse(txt);if(!Array.isArray(o.entries)){toast('不是有效备份');return}if(mode==='replace'&&!confirm('替换恢复会清空当前本地数据，确认继续？'))return;if(mode==='merge'){let set=new Set(entries.map(ekey)),added=0,skip=0;o.entries.map(normEntry).forEach(e=>{let k=ekey(e);if(set.has(k))skip++;else{entries.unshift(e);set.add(k);added++}});mergeCatList(cats,o.cats);mergeCatList(incomeCats,o.incomeCats);toast(`已合并 ${added} 条，跳过 ${skip} 条`)}else{entries=o.entries.map(normEntry);if(Array.isArray(o.cats)&&o.cats.length)cats=o.cats;if(Array.isArray(o.incomeCats)&&o.incomeCats.length)incomeCats=o.incomeCats;budget=isNaN(parseFloat(o.budget))?budget:parseFloat(o.budget);nick=o.nick||nick;avatar=o.avatar||avatar;reminder=o.reminder||reminder;toast('已替换恢复')}saveAll();closePanel('textPanel');render()}catch(e){toast('JSON 格式不对')}}function mergeCatList(target,src){if(!Array.isArray(src))return;let s=new Set(target.map(c=>c[0]+'|'+c[1]));src.forEach(c=>{if(Array.isArray(c)&&c.length>=2&&!s.has(c[0]+'|'+c[1])){target.push([c[0],c[1]]);s.add(c[0]+'|'+c[1])}})}function clearData(){if(confirm('确认清空所有账单记录？此操作不可恢复。')){entries=[];saveAll();render();toast('已清空')}}
render();
</script>
